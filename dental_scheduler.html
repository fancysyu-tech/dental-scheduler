<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="訪問診療">
  <title>訪問診療スケジューラー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f5f4f0;
      color: #1a1915;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ヘッダー */
    .header {
      background: #fff;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #1a1915;
      margin-bottom: 12px;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .control-group label {
      font-size: 13px;
      color: #888780;
      white-space: nowrap;
    }
    .control-group span {
      font-size: 15px;
      font-weight: 600;
      min-width: 24px;
      color: #1a1915;
    }
    input[type=range] {
      width: 100px;
      height: 4px;
      -webkit-appearance: none;
      background: #d3d1c7;
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #185FA5;
      cursor: pointer;
    }
    input[type=time] {
      font-size: 14px;
      padding: 6px 10px;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      background: #fff;
      color: #1a1915;
      outline: none;
    }
    .btn-regen {
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-regen:active { opacity: 0.8; transform: scale(0.97); }

    /* コンテンツ */
    .content { padding: 16px; }

    /* サマリーカード */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric {
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      border: 0.5px solid rgba(0,0,0,0.08);
    }
    .metric-label { font-size: 11px; color: #888780; margin-bottom: 4px; }
    .metric-value { font-size: 22px; font-weight: 700; color: #1a1915; }
    .metric-unit { font-size: 11px; color: #888780; margin-left: 2px; }

    /* タイムライン */
    .card {
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.08);
      padding: 14px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: #888780;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .legend {
      display: flex;
      gap: 14px;
      margin-bottom: 10px;
    }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #888780; }
    .leg-dot { width: 10px; height: 10px; border-radius: 3px; }
    .leg-dr { background: #185FA5; }
    .leg-dh { background: #0F6E56; }
    canvas { display: block; width: 100%; }

    /* DH訪問順 */
    .order-info {
      font-size: 12px;
      color: #888780;
      background: #f5f4f0;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    /* まとめ表 */
    .pt-list { display: flex; flex-direction: column; gap: 10px; }
    .pt-card {
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .pt-header {
      background: #f5f4f0;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #1a1915;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
    }
    .pt-rows { padding: 0; }
    .pt-row {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      gap: 10px;
      border-bottom: 0.5px solid rgba(0,0,0,0.06);
    }
    .pt-row:last-child { border-bottom: none; }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
      min-width: 36px;
      justify-content: center;
    }
    .chip-dr { background: #E6F1FB; color: #185FA5; }
    .chip-dh { background: #E1F5EE; color: #0F6E56; }
    .pt-time { flex: 1; }
    .pt-time-range { font-size: 14px; color: #1a1915; font-weight: 500; }
    .pt-time-sub { font-size: 11px; color: #888780; margin-top: 2px; }
  </style>
</head>
<body>

<div class="header">
  <h1>訪問診療スケジューラー</h1>
  <div class="controls">
    <div class="control-group">
      <label>患者数</label>
      <input type="range" id="ptCount" min="2" max="10" value="6" step="1">
      <span id="ptCountVal">6</span>
    </div>
    <div class="control-group">
      <label>開始</label>
      <input type="time" id="startTime" value="10:00">
    </div>
    <button class="btn-regen" onclick="regenerate()">再生成</button>
  </div>
</div>

<div class="content">
  <div class="summary-row">
    <div class="metric">
      <div class="metric-label">総所要時間</div>
      <div class="metric-value" id="totalTime">—<span class="metric-unit">分</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">Dr 稼働率</div>
      <div class="metric-value" id="drUtil">—<span class="metric-unit">%</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">DH 稼働率</div>
      <div class="metric-value" id="dhUtil">—<span class="metric-unit">%</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">タイムライン</div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot leg-dr"></div>Dr</div>
      <div class="leg-item"><div class="leg-dot leg-dh"></div>DH</div>
    </div>
    <canvas id="tlCanvas"></canvas>
  </div>

  <div class="order-info" id="orderInfo"></div>

  <div class="card-title" style="margin-bottom:10px;font-size:12px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:0.05em;">患者ごとのまとめ</div>
  <div class="pt-list" id="ptList"></div>
</div>

<script>
const ptSlider = document.getElementById('ptCount');
const ptValEl = document.getElementById('ptCountVal');
ptSlider.addEventListener('input', () => { ptValEl.textContent = ptSlider.value; });

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function toHHMM(base, off) {
  const t = base + off, h = Math.floor(t/60)%24, m = t%60;
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
function getBase() {
  const p = document.getElementById('startTime').value.split(':');
  return parseInt(p[0])*60+parseInt(p[1]);
}
function overlaps(s1,e1,s2,e2){ return s1<e2 && e1>s2; }

function calcDHSlots(dhOrder, drSlots, pts, dhOffset) {
  const n = drSlots.length;
  const dhSlots = new Array(n);
  let dhCur = dhOffset;
  for(let k=0;k<dhOrder.length;k++){
    const ptId = dhOrder[k];
    const dur = pts[ptId].dhDur;
    const g = pts[ptId].gap;
    const drS = drSlots[ptId].start;
    const drE = drSlots[ptId].end;
    let start = dhCur;
    if(start + dur <= drS - g) {
    } else if(start >= drE + g) {
    } else {
      start = drE + g;
    }
    dhSlots[ptId] = { ptId, start, end:start+dur, dur };
    dhCur = start + dur + pts[ptId].interGap;
  }
  const allEnds = [...drSlots,...dhSlots].map(s=>s.end);
  return { dhSlots, totalMin: Math.max(...allEnds) };
}

function permutations(arr) {
  if(arr.length<=1) return [arr];
  const result = [];
  for(let i=0;i<arr.length;i++){
    const rest = [...arr.slice(0,i),...arr.slice(i+1)];
    for(const p of permutations(rest)) result.push([arr[i],...p]);
  }
  return result;
}

function greedyDHOrder(drSlots, pts, dhOffset) {
  const n = pts.length;
  const unvisited = new Set(Array.from({length:n},(_,i)=>i));
  const order = [];
  let dhCur = dhOffset;
  while(unvisited.size > 0){
    let bestPtId = -1, bestEnd = Infinity;
    for(const ptId of unvisited){
      const dur = pts[ptId].dhDur;
      const g = pts[ptId].gap;
      const drS = drSlots[ptId].start;
      const drE = drSlots[ptId].end;
      let start = dhCur;
      if(start + dur <= drS - g) {
      } else if(start >= drE + g) {
      } else { start = drE + g; }
      if(start+dur < bestEnd){ bestEnd=start+dur; bestPtId=ptId; }
    }
    order.push(bestPtId);
    unvisited.delete(bestPtId);
    const ptId=bestPtId, dur=pts[ptId].dhDur, g=pts[ptId].gap;
    const drS=drSlots[ptId].start, drE=drSlots[ptId].end;
    let start=dhCur;
    if(start+dur<=drS-g){} else if(start>=drE+g){} else {start=drE+g;}
    dhCur=start+dur+pts[ptId].interGap;
  }
  return order;
}

function buildSchedule(n) {
  const pts = [];
  for(let i=0;i<n;i++) pts.push({
    drDur: rand(21,23), dhDur: rand(21,23),
    gap: rand(1,3), interGap: rand(11,12)
  });
  const drSlots = [];
  let drCur = 0;
  for(let i=0;i<n;i++){
    const dur = pts[i].drDur;
    drSlots.push({ ptId:i, start:drCur, end:drCur+dur, dur });
    if(i<n-1) drCur += dur + rand(11,12);
  }
  const dhOffset = rand(1,3);
  const ptIds = Array.from({length:n},(_,i)=>i);
  let bestOrder, bestTotal=Infinity, bestDhSlots;
  if(n<=7){
    for(const perm of permutations(ptIds)){
      const {dhSlots,totalMin}=calcDHSlots(perm,drSlots,pts,dhOffset);
      if(totalMin<bestTotal){bestTotal=totalMin;bestOrder=perm;bestDhSlots=dhSlots;}
    }
  } else {
    bestOrder=greedyDHOrder(drSlots,pts,dhOffset);
    const {dhSlots,totalMin}=calcDHSlots(bestOrder,drSlots,pts,dhOffset);
    bestTotal=totalMin; bestDhSlots=dhSlots;
  }
  return {drSlots, dhSlots:bestDhSlots, dhOrder:bestOrder, pts, dhOffset};
}

function regenerate(){
  const n = parseInt(ptSlider.value);
  const {drSlots,dhSlots,dhOrder,pts,dhOffset} = buildSchedule(n);
  const base = getBase();
  const allEnds=[...drSlots,...dhSlots].map(s=>s.end);
  const totalMin=Math.max(...allEnds);
  const drTotal=drSlots.reduce((s,e)=>s+e.dur,0);
  const dhTotal=dhSlots.reduce((s,e)=>s+e.dur,0);

  document.getElementById('totalTime').innerHTML=totalMin+'<span class="metric-unit">分</span>';
  document.getElementById('drUtil').innerHTML=Math.round(drTotal/totalMin*100)+'<span class="metric-unit">%</span>';
  document.getElementById('dhUtil').innerHTML=Math.round(dhTotal/totalMin*100)+'<span class="metric-unit">%</span>';

  const method=n<=7?'全列挙・最適解':'貪欲法・近似解';
  document.getElementById('orderInfo').innerHTML=
    `<b>DH訪問順（${method}）</b><br>${dhOrder.map(i=>'P'+(i+1)).join(' → ')}<br>Dr開始の ${dhOffset} 分後にDHスタート`;

  drawTimeline(drSlots,dhSlots,totalMin);
  drawTable(drSlots,dhSlots,n,base);
}

function drawTimeline(drSlots,dhSlots,totalMin){
  const canvas=document.getElementById('tlCanvas');
  const dpr=window.devicePixelRatio||1;
  const PAD_L=40, PAD_R=12, PAD_T=28, PAD_B=8, ROW_H=32;
  const W=canvas.parentElement.clientWidth-28;
  const H=PAD_T+2*ROW_H+PAD_B;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const base=getBase();
  const sc=(W-PAD_L-PAD_R)/totalMin;
  ctx.clearRect(0,0,W,H);
  const step=totalMin<=60?10:totalMin<=90?15:totalMin<=150?20:30;
  for(let t=0;t<=totalMin;t+=step){
    const x=PAD_L+t*sc;
    ctx.beginPath(); ctx.moveTo(x,PAD_T-6); ctx.lineTo(x,H-PAD_B);
    ctx.strokeStyle='rgba(0,0,0,0.07)'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.fillStyle='#b4b2a9'; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.fillText(toHHMM(base,t),x,PAD_T-9);
  }
  const rowLabels=['Dr','DH'], colors=['#185FA5','#0F6E56'];
  const drSorted=[...drSlots].sort((a,b)=>a.start-b.start);
  const dhSorted=[...dhSlots].sort((a,b)=>a.start-b.start);
  const allSlots=[drSorted,dhSorted];
  for(let row=0;row<2;row++){
    const y=PAD_T+row*ROW_H;
    ctx.fillStyle='#888780'; ctx.font='600 12px -apple-system,sans-serif'; ctx.textAlign='left';
    ctx.fillText(rowLabels[row],0,y+ROW_H/2+4);
    for(const sl of allSlots[row]){
      const x=PAD_L+sl.start*sc, w=Math.max(sl.dur*sc,4), bh=ROW_H-8;
      ctx.fillStyle=colors[row];
      rr(ctx,x,y+4,w,bh,5); ctx.fill();
      if(w>28){
        ctx.fillStyle='#fff'; ctx.font='600 11px -apple-system,sans-serif'; ctx.textAlign='center';
        ctx.fillText('P'+(sl.ptId+1),x+w/2,y+4+bh/2+4);
      }
    }
    if(row<1){
      ctx.beginPath(); ctx.moveTo(0,y+ROW_H); ctx.lineTo(W,y+ROW_H);
      ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=0.5; ctx.stroke();
    }
  }
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawTable(drSlots,dhSlots,n,base){
  const list=document.getElementById('ptList');
  list.innerHTML='';
  for(let i=0;i<n;i++){
    const dr=drSlots[i], dh=dhSlots[i];
    let drPar=[],dhPar=[];
    for(let j=0;j<n;j++){
      if(j===i) continue;
      if(overlaps(dr.start,dr.end,dhSlots[j].start,dhSlots[j].end)) drPar.push(j+1);
      if(overlaps(dh.start,dh.end,drSlots[j].start,drSlots[j].end)) dhPar.push(j+1);
    }
    const div=document.createElement('div');
    div.className='pt-card';
    div.innerHTML=`
      <div class="pt-header">患者 ${i+1}</div>
      <div class="pt-rows">
        <div class="pt-row">
          <span class="chip chip-dr">Dr</span>
          <div class="pt-time">
            <div class="pt-time-range">${toHHMM(base,dr.start)} 〜 ${toHHMM(base,dr.end)}</div>
            <div class="pt-time-sub">${dr.dur}分${drPar.length?'　DH(P'+drPar.join('・P')+')と並行':''}</div>
          </div>
        </div>
        <div class="pt-row">
          <span class="chip chip-dh">DH</span>
          <div class="pt-time">
            <div class="pt-time-range">${toHHMM(base,dh.start)} 〜 ${toHHMM(base,dh.end)}</div>
            <div class="pt-time-sub">${dh.dur}分${dhPar.length?'　Dr(P'+dhPar.join('・P')+')と並行':''}</div>
          </div>
        </div>
      </div>`;
    list.appendChild(div);
  }
}

ptSlider.addEventListener('input', regenerate);
document.getElementById('startTime').addEventListener('change', regenerate);
regenerate();
</script>
</body>
</html>
